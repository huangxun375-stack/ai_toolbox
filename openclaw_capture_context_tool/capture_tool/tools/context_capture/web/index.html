<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw 会话抓包分析</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background: #f6f8fb;
        color: #142033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f6f8fb;
      }

      .layout-shell {
        max-width: 1380px;
        margin: 0 auto;
        padding: 20px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }

      .toolbar h1 {
        margin: 0;
        font-size: 24px;
      }

      .toolbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toolbar button {
        border: 1px solid #d4ddec;
        background: #ffffff;
        color: #142033;
        border-radius: 10px;
        cursor: pointer;
        font: inherit;
        padding: 8px 12px;
      }

      #last-refresh-time {
        color: #52627a;
        font-size: 13px;
      }

      #session-filter-note {
        color: #3450a1;
        font-size: 13px;
      }

      #error-state {
        margin-bottom: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #fff1f1;
        color: #b42318;
        font-size: 14px;
      }

      .workspace {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 16px;
        align-items: start;
      }

      .sessions-panel,
      .detail-panel {
        border: 1px solid #e2e8f3;
        border-radius: 12px;
        background: #ffffff;
      }

      .panel-header {
        padding: 10px 12px;
        border-bottom: 1px solid #e8eef8;
        font-size: 14px;
        font-weight: 700;
        color: #1f3f8f;
      }

      .session-list {
        display: grid;
        gap: 8px;
        padding: 10px;
        max-height: calc(100vh - 180px);
        overflow: auto;
      }

      .session-item {
        width: 100%;
        border: 1px solid #dce4f2;
        border-radius: 10px;
        background: #ffffff;
        color: #142033;
        cursor: pointer;
        text-align: left;
        padding: 8px 10px;
        font: inherit;
      }

      .session-item.is-selected {
        border-color: #6f8cff;
        background: #f4f7ff;
      }

      .session-title {
        font-size: 12px;
        color: #52627a;
        margin-bottom: 4px;
      }

      .session-subtitle {
        font-size: 12px;
        color: #142033;
        line-height: 1.35;
      }

      .panel-empty {
        padding: 12px;
        color: #607089;
        font-size: 13px;
      }

      .detail-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid #eef2f8;
      }

      .meta-pill {
        padding: 4px 8px;
        border-radius: 999px;
        background: #eef3ff;
        color: #3450a1;
        font-size: 12px;
        font-weight: 600;
      }

      .flow-list {
        display: grid;
        gap: 10px;
        padding: 10px 12px;
        max-height: calc(100vh - 190px);
        overflow: auto;
      }

      .flow-item {
        border-left: 2px solid #d9e2f2;
        padding-left: 10px;
      }

      .flow-header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .flow-label {
        color: #1f3f8f;
        font-weight: 700;
        font-size: 12px;
      }

      .flow-time {
        color: #607089;
        font-size: 11px;
      }

      .flow-preview,
      .flow-full {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        line-height: 1.45;
      }

      .flow-details {
        margin-top: 6px;
      }

      .flow-details summary {
        cursor: pointer;
        color: #3450a1;
        font-size: 12px;
        font-weight: 600;
      }

      @media (max-width: 960px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .session-list,
        .flow-list {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout-shell">
      <header class="toolbar">
        <h1>OpenClaw 会话抓包分析</h1>
        <div class="toolbar-right">
          <button id="refresh-button" type="button">刷新</button>
          <span id="last-refresh-time">未刷新</span>
        </div>
      </header>

      <div id="session-filter-note"></div>
      <div id="error-state" hidden>加载失败，请稍后重试。</div>

      <main class="workspace">
        <section class="sessions-panel">
          <div class="panel-header">会话列表</div>
          <div id="session-list" class="session-list"></div>
        </section>

        <section class="detail-panel">
          <div class="panel-header">会话抓包内容</div>
          <div id="session-meta" class="detail-meta"></div>
          <div id="flow-list" class="flow-list"></div>
        </section>
      </main>
    </div>

    <script src="/web/app.js"></script>
  </body>
</html>
